<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cart - IndoAroma Exports</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        🌿 IndoAroma Exports 🌍
    </div>

    <nav id="navbar"></nav>
</header>

<!-- ================= CART ================= -->
<div style="padding:30px;">

    <h2 style="text-align:center;">Your Cart 🛒</h2>

    <table border="1" width="100%" id="cartTable" style="margin-top:20px; text-align:center;">
        
        <thead>
            <tr>
                <th>Product</th>
                <th>Price (₹)</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
        </thead>

        <!-- ✅ IMPORTANT FIX -->
        <tbody id="cartTableBody">
        </tbody>

    </table>

    <h3 style="text-align:center; margin-top:20px;" id="grandTotal"></h3>
    <button onclick="payNow()">Pay Now</button>

    <div style="text-align:center; margin-top:30px;">


</div>

    <!-- ✅ EMPTY CART MESSAGE -->
    <p id="emptyCartMsg" style="text-align:center; margin-top:20px; color:gray;"></p>

</div>

<script src="script.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>

</html>
