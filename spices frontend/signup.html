<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signup - IndoAroma Exports</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        🌿 IndoAroma Exports 🌍
    </div>

    <nav id="navbar"></nav>
</header>

<!-- ================= SIGNUP FORM ================= -->

<section style="display:flex; justify-content:center; align-items:center; min-height:75vh;">

    <div class="signup-container">

        <h1>Signup 👤</h1>

        <p class="subtitle">
            Create your account
        </p>

        <input type="text"
               id="newUsername"
               placeholder="Username">

        <small id="usernameError"></small>

        <input type="password"
               id="newPassword"
               placeholder="Password">

        <small id="passwordError"></small>

        <input type="password"
               id="confirmPassword"
               placeholder="Confirm Password">

        <small id="confirmError"></small>

        <div class="show-password">

            <input type="checkbox"
                   onclick="togglePassword()">

            <label>Show Password</label>

        </div>

        <button onclick="signup()">
            Register
        </button>

        <p id="signupMsg"
           style="color:green; margin-top:15px;">
        </p>

        <p class="bottom-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</section>

<footer>
    <p>© 2026 IndoAroma Exports. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
