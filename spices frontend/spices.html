<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Spices - IndoAroma Exports</title>
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <header>
        <div class="logo">
            🌿 IndoAroma Exports 🌍
        </div>

        <nav id="navbar"></nav>
    </header>

    <!-- ================= SPICES ================= -->
    <section class="spices">
        <h2 class="text-center mt-4">Our Exported Spices</h2>

        <div class="container mt-5">
            <input type="text" id="searchInput" placeholder="Search spices..."
                style="width:60%; padding:10px; margin-bottom:20px; border-radius:6px; border:1px solid #ccc;">
            <div style="margin-bottom:20px;">
                <button onclick="filterSpices('all')">All</button>
                <button onclick="filterSpices('hot')">🌶 Hot</button>
                <button onclick="filterSpices('aromatic')">🌿 Aromatic</button>
                <button onclick="filterSpices('medicinal')">💊 Medicinal</button>
            </div>
            <div class="spice-list" id="spiceContainer">
                <!-- Loaded from JS -->
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 IndoAroma Exports. All Rights Reserved.</p>
    </footer>

    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
